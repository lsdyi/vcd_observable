name: Sync Build to Docs Branch

on:
  push:
    branches:
      - main
      - test-workflow
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Render Quarto files
        run: |
          find quarto_file -name "*.qmd" -exec quarto render {} --to html \;

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp -r dist/. deploy/

          rsync -av quarto_file/ deploy/

          touch deploy/.nojekyll

      - name: Upload artifact for testing
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-preview
          path: deploy

      - name: Deploy to docs/building_output
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: docs/building_output
          clean: true